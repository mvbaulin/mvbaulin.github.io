<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <h1 class="header__title">Store</h1>
        </div>
    </header>

    <main>
        <div class="container">
        <section class="catalog">
            <ul class="catalog__list">
                <li class="item catalog__item">
                    <h2 class="item__title">
                        Ghost of Tsushima
                    </h2>
                    <img class="item__cover" src="https://image.api.playstation.com/vulcan/img/rnd/202011/1023/w1SOK4SXjaPRHb9oFRuh9Z0I.png" alt="Ghost of Tsushima">
                    <button class="button item__button">Купить</button>
                </li>
            </ul>
        </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">

        </div>
    </footer>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="scripts/script.js"></script>
</body>
</html>
